version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: notes_app

    working_dir: /var/www

    volumes:
      - .:/var/www

    depends_on:
      - mysql

  nginx:
    image: nginx:alpine

    container_name: notes_nginx

    ports:
      - "8080:80"

    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  mysql:
    image: mysql:8.0

    container_name: notes_mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: myproject
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
